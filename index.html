<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFA Level II Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand-name">Study<span>Hub</span></div>
            <button class="snbtn on" onclick="goPage('dash')">Dashboard</button>
        </aside>

        <main class="main">
            <!-- Dashboard/Chapter Selection View -->
            <div class="page on" id="page-dash">
                <div class="ph">
                    <h1 class="ph-title">Your progress</h1>
                    <p class="ph-sub">CFA Level II · 10 topics</p>
                </div>
                <div class="tgrid" id="topics-grid"></div>
            </div>

            <!-- Detailed Notes View -->
            <div class="page" id="page-topic">
                <button class="backbtn" onclick="openChapterGrid(curTopic)">← Back to Chapters</button>
                <h1 id="t-title">Chapter Title</h1>
                <div id="tab-body"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
