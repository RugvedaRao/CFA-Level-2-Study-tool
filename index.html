<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFA Level II Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="shell">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand-name">Study<span>Hub</span></div>
            <div class="sidenav">
                <div class="snlabel">Overview</div>
                <button class="snbtn" onclick="buildSubjectDashboard()">
                    <div style="font-size: 14px;">◈</div> Dashboard
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main">
            <!-- View 1: Dashboard -->
            <div class="page on" id="page-dash">
                <div class="ph">
                    <h1 class="ph-title">Your progress</h1>
                    <p class="ph-sub">CFA Level II · 10 topics</p>
                </div>
                <div class="tgrid" id="topics-grid"></div>
            </div>

            <!-- View 2: Notes Viewer -->
            <div class="page" id="page-topic">
                <button class="backbtn" onclick="buildSubjectDashboard()">← Back to Subjects</button>
                <h1 id="t-title" style="font-size: 28px; font-weight: 800; margin-bottom: 24px; color: #1e293b;"></h1>
                <div id="tab-body"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
