<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFA Level II Study Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2 class="sr-only">CFA Level 2 complete study hub with dashboard, topic notes, and free chapter quizzes</h2>

    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-eye">CFA Level II</div>
                <div class="brand-name">Study<span>Hub</span></div>
            </div>
            <div class="sidenav">
                <div class="snlabel">Overview</div>
                <button class="snbtn on" id="nav-dash" onclick="goPage('dash',this)">
                    <div class="snicon">◈</div>Dashboard
                </button>
                <div class="snlabel" style="margin-top:6px">Topics</div>
                <div id="sidenav-topics"></div>
            </div>
            <!-- Removed Upgrade Box from here -->
        </aside>

        <main class="main">
            <div class="page on" id="page-dash">
                <div class="ph">
                    <div>
                        <div class="ph-title">Your progress</div>
                        <div class="ph-sub">CFA Level II · 10 topics · 50 quiz questions</div>
                    </div>
                    <button class="plan-btn">Get study plan ↗</button>
                </div>
                <div class="stats3"> <!-- Changed from stats4 to stats3 -->
                    <div class="scard"><div class="snum" id="st-acc">0<sup>%</sup></div><div class="slbl">Quiz accuracy</div><div class="sbar"><div class="sbarf" id="sb-acc" style="width:0%"></div></div></div>
                    <div class="scard"><div class="snum" id="st-done">0<sup>/10</sup></div><div class="slbl">Topics attempted</div><div class="sbar"><div class="sbarf" id="sb-done" style="width:0%"></div></div></div>
                    <div class="scard"><div class="snum" id="st-q">0<sup>/50</sup></div><div class="slbl">Questions answered</div><div class="sbar"><div class="sbarf" id="sb-q" style="width:0%"></div></div></div>
                </div>
                <div class="tgrid" id="topics-grid"></div>
            </div>

            <div class="page" id="page-topic">
                <div class="dh">
                    <button class="backbtn" onclick="goPage('dash',document.getElementById('nav-dash'))">← back</button>
                    <div><div class="dtitle" id="t-title"></div><div class="dsub" id="t-sub"></div></div>
                </div>
                <div class="ctabs">
                    <button class="ctab" id="ctab-notes" onclick="switchTab('notes')">Notes</button>
                    <button class="ctab on" id="ctab-quiz" onclick="switchTab('quiz')">Quiz</button>
                </div>
                <div id="tab-body"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
